<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Redirect SPA routes to index.html on GitHub Pages
    var path = window.location.pathname;
    var base = '/climate-erp-development';
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      base + '/?p=' + encodeURIComponent(path.slice(base.length) + search) + (hash || '')
    );
  </script>
</head>
</html>
